# file: schema-generator.yml
# author: orb-integration-hub
# date: 2026-02-20
# description: orb-schema-generator 2.0.3 configuration

version: '2.0'

project:
  name: orb-integration-hub
  customerId: orb
  projectId: integration-hub
  environment: dev

paths:
  schemas: ./schemas
  subdirectories:
    core: core
    tables: tables
    models: models
    registries: registries
    graphql: graphql
    lambdas: lambdas

output:
  code:
    python:
      targets:
        python-main:
          base_dir: ./apps/api
          enums_subdir: enums
          models_subdir: models

    typescript:
      targets:
        ts-main:
          base_dir: ./apps/web/src/app
          enums_subdir: core/enums
          models_subdir: core/models
          graphql_queries_subdir: core/graphql

    graphql:
      targets:
        graphql-main:
          base_dir: ./apps/api/graphql
        graphql-sdk:
          base_dir: ./apps/api/graphql-sdk

  infrastructure:
    format: cdk
    cdk:
      base_dir: ./infrastructure/cdk/generated
      language: python
      generate_stack: false

  testing:
    e2e:
      enabled: true
      framework: playwright
      base_dir: ./apps/web/e2e
      tests_subdir: tests
      page_objects_subdir: page-objects
      fixtures_subdir: fixtures
      config_file: playwright.config.ts

generation:
  validate_schemas: true
  validate_graphql: true
  cleanup_old_files: true

logging:
  level: INFO
  file: ./schema_generator.log
