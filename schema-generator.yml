project:
  name: orb-integration-hub
  customerId: orb
  projectId: integration-hub
  environment: dev
paths:
  schemas: ./schemas
  subdirectories:
    core: core
    tables: tables
    models: models
    registries: registries
    graphql: graphql
    lambdas: lambdas
output:
  code:
    python:
      targets:
        python-main:
          base_dir: ./apps/api
          enums_subdir: enums
          models_subdir: models
    typescript:
      targets:
        ts-main:
          base_dir: ./apps/web/src/app
          enums_subdir: core/enums
          models_subdir: core/models
    graphql:
      targets:
        graphql-main:
          base_dir: ./apps/api/graphql
        graphql-sdk:
          base_dir: ./apps/api/graphql-sdk
  infrastructure:
    cdk:
      base_dir: ./infrastructure/cdk/generated
      language: python
    appsync:
      main-api:
        name: main-api
        auth:
          default: AMAZON_COGNITO_USER_POOLS
          cognito:
            user_pool_ssm_param: "/${customerId}/${projectId}/${environment}/cognito/user-pool-id"
        tables:
          - Users
          - Organizations
          - OrganizationUsers
          - Applications
          - ApplicationRoles
          - ApplicationUserRoles
          - ApplicationEnvironmentConfig
          - ApplicationApiKeys
          - Notifications
          - OwnershipTransferRequests
          - PrivacyRequests
          - SmsRateLimit
        include_operations:
          - "*"
        schema_output: apps/api/graphql/schema.graphql
        resolvers_output: apps/api/graphql/resolvers
        cdk_output: infrastructure/cdk/generated/appsync/main_api
      sdk-api:
        name: sdk-api
        auth:
          default: AWS_LAMBDA
          lambda_authorizer:
            function_arn_ssm_param: "/${customerId}/${projectId}/${environment}/lambda/authorizer/arn"
            result_ttl_seconds: 300
        tables:
          - Users
        include_operations:
          - "CheckEmailExists"
          - "CreateUserFromCognito"
          - "GetApplicationUsers"
        schema_output: apps/api/graphql-sdk/schema.graphql
        resolvers_output: apps/api/graphql-sdk/resolvers
        cdk_output: infrastructure/cdk/generated/appsync/sdk_api
generation:
  validate_schemas: true
  validate_graphql: true
  cleanup_old_files: true
logging:
  level: INFO
  file: ./schema_generator.log
