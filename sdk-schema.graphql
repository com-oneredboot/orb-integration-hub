schema {
  query: Query
  mutation: Mutation
}

#  Types
type Applications {
  apiKey: String!
  apiKeyNext: String
  applicationId: String!
  createdAt: AWSTimestamp!
  description: String
  environments: [String]!
  groupCount: Float
  name: String!
  organizationId: String!
  ownerId: String!
  roleCount: Float
  status: ApplicationStatus!
  updatedAt: AWSTimestamp!
  userCount: Float
}

#  Response Types
type ApplicationsCreateResponse {
  code: Int!
  item: Applications
  message: String
  success: Boolean!
}

type ApplicationsDeleteResponse {
  code: Int!
  item: Applications
  message: String
  success: Boolean!
}

type ApplicationsDisableResponse {
  code: Int!
  item: Applications
  message: String
  success: Boolean!
}

type ApplicationsGetResponse {
  code: Int!
  item: Applications
  message: String
  success: Boolean!
}

type ApplicationsListResponse {
  code: Int!
  items: [Applications!]
  message: String
  nextToken: String
  success: Boolean!
}

type ApplicationsUpdateResponse {
  code: Int!
  item: Applications
  message: String
  success: Boolean!
}

type CheckEmailExists {
  cognitoStatus: String
  cognitoSub: String
  email: String!
  exists: Boolean
}

type CreateUserFromCognito {
  cognitoSub: String!
  createdAt: AWSTimestamp
  email: String
  emailVerified: Boolean
  firstName: String
  groups: [String]
  lastName: String
  mfaEnabled: Boolean
  mfaSetupComplete: Boolean
  phoneVerified: Boolean
  status: String
  updatedAt: AWSTimestamp
  userId: String
}

#  Mutations
type Mutation {
  ApplicationsCreate(input: ApplicationsCreateInput!): ApplicationsCreateResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  ApplicationsDelete(input: ApplicationsDeleteInput!): ApplicationsDeleteResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  ApplicationsDisable(input: ApplicationsDisableInput!): ApplicationsDisableResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  ApplicationsUpdate(input: ApplicationsUpdateInput!): ApplicationsUpdateResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  CreateUserFromCognito(input: CreateUserFromCognitoInput!): CreateUserFromCognito
  UsersCreate(input: UsersCreateInput!): UsersCreateResponse @aws_auth(cognito_groups : ["EMPLOYEE", "OWNER"])
  UsersDelete(input: UsersDeleteInput!): UsersDeleteResponse @aws_auth(cognito_groups : ["EMPLOYEE", "OWNER"])
  UsersDisable(input: UsersDisableInput!): UsersDisableResponse @aws_auth(cognito_groups : ["OWNER"])
  UsersUpdate(input: UsersUpdateInput!): UsersUpdateResponse @aws_auth(cognito_groups : ["EMPLOYEE", "OWNER", "USER"])
}

#  Queries
type Query {
  ApplicationsGet(input: ApplicationsGetInput!): ApplicationsGetResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  ApplicationsListByApplicationId(input: ApplicationsListByApplicationIdInput!): ApplicationsListResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  ApplicationsListByOrganizationId(input: ApplicationsListByOrganizationIdInput!): ApplicationsListResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  ApplicationsListByOrganizationIdAndCreatedAt(input: ApplicationsListByOrganizationIdAndCreatedAtInput!): ApplicationsListResponse @aws_auth(cognito_groups : ["CUSTOMER", "EMPLOYEE", "OWNER"])
  CheckEmailExists(input: CheckEmailExistsInput!): CheckEmailExists
  UsersGet(input: UsersGetInput!): UsersGetResponse @aws_auth(cognito_groups : ["OWNER", "USER"])
  UsersListByCognitoId(input: UsersListByCognitoIdInput!): UsersListResponse @aws_auth(cognito_groups : ["OWNER"])
  UsersListByCognitoSub(input: UsersListByCognitoSubInput!): UsersListResponse @aws_auth(cognito_groups : ["OWNER", "USER"])
  UsersListByEmail(input: UsersListByEmailInput!): UsersListResponse @aws_auth(cognito_groups : ["OWNER", "USER"])
  UsersListByUserId(input: UsersListByUserIdInput!): UsersListResponse @aws_auth(cognito_groups : ["OWNER", "USER"])
}

