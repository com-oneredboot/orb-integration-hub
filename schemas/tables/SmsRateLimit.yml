version: '1'
name: SmsRateLimit
model:
  attributes:
  - name: phoneNumber
    type: string
    description: Phone number used as the rate limit key (primary key)
    required: true
  - name: requestCount
    type: integer
    description: Number of SMS requests made within the rate limit window
    required: true
  - name: firstRequestTime
    type: timestamp
    description: Timestamp of the first request in the current rate limit window
    required: true
  - name: ttl
    type: integer
    description: Time-to-live timestamp for automatic record cleanup
    required: true
dynamodb:
  partition_key: phoneNumber
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        USER:
        - '*'
hash: "sha256:b5b2502451d3b76f9cf54c91bacbf274fa51ccd7a63d49d7bcc8566bc7854354"
