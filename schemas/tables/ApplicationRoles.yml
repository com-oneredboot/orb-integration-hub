version: '1'
name: ApplicationRoles
model:
  attributes:
  - name: applicationRoleId
    type: string
    description: Unique identifier for the application role definition (primary key)
    required: true
  - name: applicationId
    type: string
    description: ID of the application this role belongs to (foreign key to Applications)
    required: true
  - name: roleId
    type: string
    description: Unique role identifier within the application
    required: true
  - name: roleName
    type: string
    description: Display name of the role (e.g., "Admin", "Editor", "Viewer")
    required: true
  - name: roleType
    type: string
    description: Type of the role
    required: true
    enum_type: ApplicationRoleType
  - name: description
    type: string
    description: Optional description of what this role is for
    required: false
  - name: status
    type: string
    description: Current status of the role definition
    required: true
    enum_type: ApplicationRoleStatus
  - name: createdAt
    type: timestamp
    description: When the role was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the role was last updated
    required: true
dynamodb:
  partition_key: applicationRoleId
  gsi:
  - name: ApplicationRoleIndex
    partition_key: applicationId
    projection_type: ALL
    sort_key: roleId
  - name: RoleTypeIndex
    partition_key: roleId
    projection_type: ALL
    sort_key: roleType
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
