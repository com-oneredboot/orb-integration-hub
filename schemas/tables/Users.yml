version: '1'
name: Users
model:
  attributes:
  - name: userId
    type: string
    description: Unique identifier for the user (primary key)
    required: true
  - name: cognitoId
    type: string
    description: Cognito username (used for authentication)
    required: true
  - name: cognitoSub
    type: string
    description: Cognito user sub (unique identifier from tokens)
    required: true
  - name: email
    type: string
    description: User's email address
    required: true
  - name: firstName
    type: string
    description: User's first name
    required: true
  - name: lastName
    type: string
    description: User's last name
    required: true
  - name: status
    type: string
    description: Current status of the user
    required: true
    enum_type: UserStatus
  - name: createdAt
    type: timestamp
    description: When the user was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the user was last updated
    required: true
  - name: phoneNumber
    type: string
    description: User's phone number
    required: false
  - name: groups
    type: list
    description: List of Cognito groups the user belongs to (used for AppSync @aws_auth)
    required: false
    items: string
  - name: emailVerified
    type: boolean
    description: Whether the user's email is verified
    required: false
  - name: phoneVerified
    type: boolean
    description: Whether the user's phone number is verified
    required: false
  - name: mfaEnabled
    type: boolean
    description: Whether multi-factor authentication is enabled for the user
    required: false
  - name: mfaSetupComplete
    type: boolean
    description: Whether MFA setup has been completed successfully
    required: false
dynamodb:
  partition_key: userId
  gsi:
  - name: EmailIndex
    partition_key: email
    projection_type: ALL
  - name: CognitoIdIndex
    partition_key: cognitoId
    projection_type: ALL
  - name: CognitoSubIndex
    partition_key: cognitoSub
    projection_type: ALL
  stream:
    enabled: true
    view_type: NEW_AND_OLD_IMAGES
  pitr_enabled: false
appsync:
  auth_config:
    apiKeyAuthentication:
    - Users
    - UsersResponse
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - UsersCreate
        - UsersUpdate
        - UsersDelete
        CUSTOMER:
        - Users
        - UsersResponse
        USER:
        - Users
        - UsersResponse
        - UsersUpdate
        - UsersGet
        - UsersListByUserId
        - UsersListByEmail
        - UsersListByCognitoSub
hash: "sha256:d324be3b50d5d8869084a10f5e3c20ec6eab4b9a3883cfb27db29f0da533a8ad"
