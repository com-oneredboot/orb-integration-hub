version: '1'
name: PrivacyRequests
model:
  attributes:
  - name: requestId
    type: string
    description: Unique identifier for the privacy request
    required: true
  - name: organizationId
    type: string
    description: ID of the organization handling the request
    required: true
  - name: requestType
    type: string
    description: Type of privacy request (DATA_ACCESS, DATA_DELETION, etc.)
    required: true
    enum_type: PrivacyRequestType
  - name: status
    type: string
    description: Current status of the request
    required: true
    enum_type: PrivacyRequestStatus
  - name: dataSubjectEmail
    type: string
    description: Email of the data subject making the request
    required: true
  - name: dataSubjectName
    type: string
    description: Name of the data subject
    required: false
  - name: legalBasis
    type: string
    description: Legal basis for the request (GDPR Article, CCPA Right, etc.)
    required: true
    enum_type: LegalBasis
  - name: description
    type: string
    description: Additional details about the request
    required: false
  - name: receivedAt
    type: timestamp
    description: When the request was received
    required: true
  - name: deadline
    type: timestamp
    description: Deadline for completing the request
    required: true
  - name: completedAt
    type: timestamp
    description: When the request was completed
    required: false
  - name: assignedTo
    type: string
    description: ID of the employee assigned to handle the request
    required: false
  - name: notes
    type: string
    description: Internal notes about the request
    required: false
  - name: createdAt
    type: timestamp
    description: When the record was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the record was last updated
    required: true
dynamodb:
  partition_key: requestId
  gsi:
  - name: RequestTypeIndex
    partition_key: requestType
    projection_type: ALL
    sort_key: receivedAt
  - name: DataSubjectIndex
    partition_key: dataSubjectEmail
    projection_type: ALL
    sort_key: receivedAt
  - name: OrganizationIndex
    partition_key: organizationId
    projection_type: ALL
    sort_key: receivedAt
  - name: StatusIndex
    partition_key: status
    projection_type: ALL
    sort_key: deadline
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
hash: "sha256:ba59086efe3bf069ab98b9a1c5c2ae391f1a51b8741c32d803ba7a29760ed37f"
