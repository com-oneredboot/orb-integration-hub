version: '1'
name: OwnershipTransferRequests
model:
  attributes:
  - name: transferId
    type: string
    description: Unique identifier for the transfer request
    required: true
  - name: organizationId
    type: string
    description: ID of the organization being transferred
    required: true
  - name: currentOwnerId
    type: string
    description: ID of the current owner initiating the transfer
    required: true
  - name: newOwnerId
    type: string
    description: ID of the user receiving ownership
    required: true
  - name: status
    type: string
    description: Current status of the transfer request
    required: true
    enum_type: OwnershipTransferStatus
  - name: reason
    type: string
    description: Reason for the ownership transfer
    required: false
  - name: expiresAt
    type: string
    description: When the transfer request expires (ISO 8601 format)
    required: true
  - name: completedAt
    type: string
    description: When the transfer was completed
    required: false
  - name: cancelledAt
    type: string
    description: When the transfer was cancelled
    required: false
  - name: createdAt
    type: string
    description: When the transfer request was created (ISO 8601 format)
    required: true
  - name: updatedAt
    type: string
    description: When the transfer request was last updated
    required: true
dynamodb:
  partition_key: transferId
  gsi:
  - name: CurrentOwnerIndex
    partition_key: currentOwnerId
    projection_type: ALL
    sort_key: createdAt
  - name: NewOwnerIndex
    partition_key: newOwnerId
    projection_type: ALL
    sort_key: createdAt
  - name: StatusIndex
    partition_key: status
    projection_type: ALL
    sort_key: createdAt
  - name: ExpirationIndex
    partition_key: status
    projection_type: ALL
    sort_key: expiresAt
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:099d2e860986b56f5fcb1a2def2663782ed3a98ec4ff95ca12b07f25c339af97"
