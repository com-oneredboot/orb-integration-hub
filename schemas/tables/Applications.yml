version: '1'
name: Applications
model:
  attributes:
  - name: applicationId
    type: string
    description: Unique identifier for the application (primary key)
    required: true
  - name: name
    type: string
    description: Name of the application
    required: true
  - name: description
    type: string
    description: Brief description of the application
    required: false
  - name: organizationId
    type: string
    description: ID of the organization this application belongs to (foreign key to
      Organizations)
    required: true
  - name: ownerId
    type: string
    description: ID of the user who owns the application (foreign key to Users)
    required: true
  - name: status
    type: string
    description: Current status of the application
    required: true
    enum_type: ApplicationStatus
  - name: createdAt
    type: timestamp
    description: When the application was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the application was last updated
    required: true
  - name: apiKey
    type: string
    description: Current active API key for the application
    required: true
  - name: apiKeyNext
    type: string
    description: Next API key for rotation (dual key system)
    required: false
  - name: environments
    type: list
    description: List of available environments for this application (max 5 for starter
      plan)
    required: true
    items: string
  - name: groupCount
    type: integer
    description: Count of ACTIVE application groups (denormalized for display)
    required: false
  - name: userCount
    type: integer
    description: Count of ACTIVE application group users (denormalized for display)
    required: false
  - name: roleCount
    type: integer
    description: Count of ACTIVE direct user role assignments (denormalized for display)
    required: false
dynamodb:
  partition_key: applicationId
  gsi:
  - name: OrganizationAppsIndex
    partition_key: organizationId
    projection_type: ALL
    sort_key: createdAt
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:1552774fac73ecd9179e0655969943125cc006895da430d9a353a4a8a23447bb"
