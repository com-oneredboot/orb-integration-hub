version: '1'
name: ApplicationApiKeys
model:
  attributes:
  - name: applicationApiKeyId
    type: string
    description: Unique identifier for the API key record (primary key)
    required: true
  - name: applicationId
    type: string
    description: ID of the application this key belongs to (foreign key to Applications)
    required: true
  - name: organizationId
    type: string
    description: ID of the organization (denormalized for context)
    required: true
  - name: environment
    type: string
    description: Environment this key is valid for
    required: true
    enum_type: Environment
  - name: keyHash
    type: string
    description: SHA-256 hash of the API key (for secure lookup)
    required: true
  - name: keyPrefix
    type: string
    description: First 12 chars of key for display (e.g., pk_dev_xxxx or sk_dev_xxxx)
    required: true
  - name: keyType
    type: string
    description: Type of API key (PUBLISHABLE for frontend, SECRET for backend)
    required: true
    enum_type: ApplicationApiKeyType
  - name: permissions
    type: list
    description: List of permission strings for this key (e.g., read:users, write:groups)
    required: false
    items: string
  - name: status
    type: string
    description: Current status of the API key
    required: true
    enum_type: ApplicationApiKeyStatus
  - name: nextKeyHash
    type: string
    description: Hash of the next key during rotation (both keys valid)
    required: false
  - name: activatesAt
    type: timestamp
    description: Future activation timestamp (null = immediate activation)
    required: false
  - name: expiresAt
    type: timestamp
    description: Expiration timestamp for ROTATING keys (7 days after regeneration)
      or REVOKED keys (set to revokedAt)
    required: false
  - name: revokedAt
    type: timestamp
    description: When the key was revoked (null if not revoked)
    required: false
  - name: lastUsedAt
    type: timestamp
    description: Timestamp of last key usage
    required: false
  - name: createdAt
    type: timestamp
    description: When the key was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the key was last updated
    required: true
  - name: ttl
    type: integer
    description: DynamoDB TTL attribute (Unix timestamp for auto-deletion 30 days
      after expiresAt)
    required: false
dynamodb:
  partition_key: applicationApiKeyId
  gsi:
  - name: AppEnvKeyIndex
    partition_key: applicationId
    projection_type: ALL
    sort_key: environment
  - name: KeyLookupIndex
    partition_key: keyHash
    projection_type: ALL
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
