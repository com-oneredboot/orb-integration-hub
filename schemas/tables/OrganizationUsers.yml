version: '1'
name: OrganizationUsers
model:
  attributes:
  - name: userId
    type: string
    description: ID of the user (foreign key to Users table)
    required: true
  - name: organizationId
    type: string
    description: ID of the organization (foreign key to Organizations table)
    required: true
  - name: role
    type: string
    description: Role of the user within the organization
    required: true
    enum_type: OrganizationUserRole
  - name: status
    type: string
    description: Status of the user's membership
    required: true
    enum_type: OrganizationUserStatus
  - name: invitedBy
    type: string
    description: ID of the user who invited this member
    required: false
  - name: invitedAt
    type: timestamp
    description: When the invitation was sent
    required: false
  - name: joinedAt
    type: timestamp
    description: When the user accepted and joined
    required: false
  - name: createdAt
    type: timestamp
    description: When the membership record was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the membership record was last updated
    required: true
dynamodb:
  partition_key: userId
  sort_key: organizationId
  gsi:
  - name: OrganizationMembersIndex
    partition_key: organizationId
    projection_type: ALL
    sort_key: role
  - name: UserOrganizationsIndex
    partition_key: userId
    projection_type: ALL
    sort_key: role
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:7e0d06247ef87209d3c34cdaa4dc69b6978a758d3950d7029479ba367b643d63"
