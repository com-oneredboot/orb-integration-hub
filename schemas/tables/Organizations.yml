version: '1'
name: Organizations
model:
  attributes:
  - name: organizationId
    type: string
    description: Unique identifier for the organization (primary key)
    required: true
  - name: name
    type: string
    description: Name of the organization
    required: true
  - name: description
    type: string
    description: Optional description of the organization
    required: false
  - name: ownerId
    type: string
    description: ID of the CUSTOMER user who owns the organization (foreign key to
      Users)
    required: true
  - name: status
    type: string
    description: Current status of the organization
    required: true
    enum_type: OrganizationStatus
  - name: createdAt
    type: timestamp
    description: When the organization was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the organization was last updated
    required: true
  - name: kmsKeyId
    type: string
    description: Organization-specific KMS key ID for encryption
    required: false
  - name: kmsKeyArn
    type: string
    description: Organization-specific KMS key ARN
    required: false
  - name: kmsAlias
    type: string
    description: Organization-specific KMS key alias name
    required: false
  - name: applicationCount
    type: integer
    description: Denormalized count of applications belonging to this organization
    required: false
    default: 0
dynamodb:
  partition_key: organizationId
  gsi:
  - name: OwnerIndex
    partition_key: ownerId
    projection_type: ALL
    sort_key: createdAt
  - name: StatusCreatedIndex
    partition_key: status
    projection_type: ALL
    sort_key: createdAt
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:a37696c424826689a91ba1159455d94e944999dcf712b6a84609befd857bd8bc"
