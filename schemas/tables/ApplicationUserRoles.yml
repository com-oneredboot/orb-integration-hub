version: '1'
name: ApplicationUserRoles
model:
  attributes:
  - name: applicationUserRoleId
    type: string
    description: Unique identifier for the user-role assignment (primary key)
    required: true
  - name: userId
    type: string
    description: ID of the user (foreign key to Users)
    required: true
  - name: applicationId
    type: string
    description: ID of the application (foreign key to Applications)
    required: true
  - name: organizationId
    type: string
    description: Organization ID (denormalized for filtering)
    required: true
  - name: organizationName
    type: string
    description: Organization name (denormalized for display)
    required: true
  - name: applicationName
    type: string
    description: Application name (denormalized for display)
    required: true
  - name: environment
    type: string
    description: Environment this role assignment applies to
    required: true
    enum_type: Environment
  - name: roleId
    type: string
    description: ID of the role (foreign key to Roles)
    required: true
  - name: roleName
    type: string
    description: Name of the role (denormalized for display and JWT)
    required: true
  - name: status
    type: string
    description: Current status of the role assignment
    required: true
    enum_type: ApplicationUserRoleStatus
  - name: createdAt
    type: timestamp
    description: When the role was assigned to the user
    required: true
  - name: updatedAt
    type: timestamp
    description: When the assignment was last updated
    required: true
lambda:
  operation: mutation
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
dynamodb:
  partition_key: applicationUserRoleId
  pitr_enabled: false
  gsi:
    - name: UserEnvRoleIndex
      partition_key: userId
      sort_key: environment
      projection_type: ALL
    - name: AppEnvUserIndex
      partition_key: applicationId
      sort_key: environment
      projection_type: ALL
    - name: UserAppIndex
      partition_key: userId
      sort_key: applicationId
      projection_type: ALL
    - name: UserStatusIndex
      partition_key: userId
      sort_key: status
      projection_type: ALL
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:032b04e66d837cafacb7c7da9a6d23a6fe00cb0c4e15aeb6948a4b1a51017a1e"
