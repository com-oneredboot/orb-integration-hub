version: '1'
name: Notifications
model:
  attributes:
  - name: notificationId
    type: string
    description: Unique identifier for the notification (primary key)
    required: true
  - name: recipientUserId
    type: string
    description: ID of the user who should receive this notification (foreign key
      to Users)
    required: true
  - name: senderUserId
    type: string
    description: ID of the user who triggered this notification (foreign key to Users)
    required: false
  - name: type
    type: string
    description: Type of notification
    required: true
    enum_type: NotificationType
  - name: status
    type: string
    description: Current status of the notification
    required: true
    enum_type: NotificationStatus
  - name: title
    type: string
    description: Title/subject of the notification
    required: true
  - name: message
    type: string
    description: Content/body of the notification
    required: true
  - name: metadata
    type: map
    description: Additional context data (applicationId, organizationId, etc.)
    required: false
  - name: expiresAt
    type: timestamp
    description: When the notification expires (for time-sensitive actions)
    required: false
  - name: createdAt
    type: timestamp
    description: When the notification was created
    required: true
  - name: updatedAt
    type: timestamp
    description: When the notification was last updated
    required: true
dynamodb:
  partition_key: notificationId
  gsi:
  - name: UserNotificationsIndex
    partition_key: recipientUserId
    projection_type: ALL
    sort_key: createdAt
  - name: TypeStatusIndex
    partition_key: type
    projection_type: ALL
    sort_key: status
  pitr_enabled: false
appsync:
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:b856568cbc6f719caf1366237d8ff150b998a3c2b654762244fa097d21c18952"
