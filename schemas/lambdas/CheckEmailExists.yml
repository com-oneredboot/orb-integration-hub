version: '1'
name: CheckEmailExists
model:
  attributes:
  - name: email
    type: string
    description: Email address to check for existence
    required: true
  - name: exists
    type: boolean
    description: Whether the email exists in the system (response only)
    required: false
  - name: cognitoStatus
    type: string
    description: Cognito user status (UNCONFIRMED, CONFIRMED, FORCE_CHANGE_PASSWORD,
      etc.)
    required: false
  - name: cognitoSub
    type: string
    description: Cognito user ID (sub) if user exists in Cognito
    required: false
lambda:
  operation: query
hash: "sha256:a1d6833959e4bbfc62b38bdbc865fb1e962e057c258d8b61db789e07cf4d67db"
