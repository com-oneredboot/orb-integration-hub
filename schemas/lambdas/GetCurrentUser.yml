version: '1'
name: GetCurrentUser
model:
  attributes:
  - name: userId
    type: string
    description: User ID (same as cognitoSub)
    required: false
  - name: cognitoId
    type: string
    description: Cognito username
    required: false
  - name: cognitoSub
    type: string
    description: Cognito user sub (UUID)
    required: false
  - name: email
    type: string
    description: User's email address
    required: false
  - name: firstName
    type: string
    description: User's first name
    required: false
  - name: lastName
    type: string
    description: User's last name
    required: false
  - name: status
    type: string
    description: Current user status
    required: false
    enum_type: UserStatus
  - name: phoneNumber
    type: string
    description: User's phone number
    required: false
  - name: groups
    type: list
    description: Cognito groups the user belongs to
    required: false
    items: string
  - name: emailVerified
    type: boolean
    description: Whether email is verified
    required: false
  - name: phoneVerified
    type: boolean
    description: Whether phone is verified
    required: false
  - name: mfaEnabled
    type: boolean
    description: Whether MFA is enabled
    required: false
  - name: mfaSetupComplete
    type: boolean
    description: Whether MFA setup is complete
    required: false
  - name: createdAt
    type: timestamp
    description: Record creation timestamp
    required: false
  - name: updatedAt
    type: timestamp
    description: Record update timestamp
    required: false
lambda:
  operation: query
  auth_config:
    cognitoAuthentication:
      groups:
        USER:
        - GetCurrentUser
        OWNER:
        - GetCurrentUser
hash: "sha256:2b23aa83298e4a78dd5cb2271a305036ba13d60d577215b6843eee735acaf4fe"
