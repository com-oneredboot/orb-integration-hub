version: '1'
name: SmsVerification
model:
  attributes:
  - name: phoneNumber
    type: string
    description: the phone number to verify
    required: true
  - name: code
    type: string
    description: the confirmation Code
    required: false
  - name: valid
    type: boolean
    description: whether the provided code is valid (returned during verification)
    required: false
lambda:
  operation: mutation
  auth_config:
    cognitoAuthentication:
      groups:
        USER:
        - SmsVerification
        - SmsVerificationResponse
        OWNER:
        - SmsVerification
        - SmsVerificationResponse
hash: "sha256:9bf10ae3d813eeec526fe9caeacbf19039887d4a02376a68043935689f1c3241"
