version: '1'
name: CreateUserFromCognito
model:
  attributes:
  - name: cognitoSub
    type: string
    description: Cognito user ID (sub) to create record for - must be valid UUID
    required: true
  - name: userId
    type: string
    description: Created user ID (same as cognitoSub)
    required: false
  - name: email
    type: string
    description: Email address from Cognito
    required: false
  - name: firstName
    type: string
    description: First name (given_name) from Cognito
    required: false
  - name: lastName
    type: string
    description: Last name (family_name) from Cognito
    required: false
  - name: status
    type: string
    description: User status (always PENDING for new users)
    required: false
  - name: emailVerified
    type: boolean
    description: Email verification status from Cognito
    required: false
  - name: phoneVerified
    type: boolean
    description: Phone verification status (always false for new users)
    required: false
  - name: mfaEnabled
    type: boolean
    description: MFA enabled status (true if user completed MFA)
    required: false
  - name: mfaSetupComplete
    type: boolean
    description: MFA setup complete status (true if user completed MFA)
    required: false
  - name: groups
    type: list
    description: User groups (always ['USER'] for new users)
    required: false
    items: string
  - name: createdAt
    type: timestamp
    description: Record creation timestamp
    required: false
  - name: updatedAt
    type: timestamp
    description: Record update timestamp
    required: false
lambda:
  operation: mutation
hash: "sha256:773e1fc44063d0c5bc57650d8c912491f617308ae0c3bb8e89f798f93e6d4569"
