version: '1'
name: GetApplicationUsers
model:
  attributes:
  - name: organizationIds
    type: list
    description: Filter by organization IDs
    required: false
    items:
      type: string
  - name: applicationIds
    type: list
    description: Filter by application IDs
    required: false
    items:
      type: string
  - name: environment
    type: string
    description: Filter by environment
    required: false
  - name: limit
    type: integer
    description: Maximum number of users to return (1-100)
    required: false
  - name: nextToken
    type: string
    description: Pagination token for next page
    required: false
  - name: users
    type: list
    description: List of users with their role assignments
    required: true
lambda:
  operation: query
  auth_config:
    cognitoAuthentication:
      groups:
        OWNER:
        - '*'
        EMPLOYEE:
        - '*'
        CUSTOMER:
        - '*'
hash: "sha256:e28b7208681aa1e9f1c61ed02a633725f019a508843e39adb8329d347ecb48ab"
